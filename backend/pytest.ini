[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts = -v --strict-markers --tb=short
markers =
    integration: requires network or APIs
    llm: requires LiteLLM-compatible API key (GEMINI_API_KEY)
    network: requires internet connectivity
    slow: takes more than 60 seconds (marker ML models)
    docker: requires Docker Desktop running

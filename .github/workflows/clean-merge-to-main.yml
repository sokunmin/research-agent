name: Clean Merge to Main

# 由 git-pr-description skill 透過 gh workflow run 觸發
# 從 main 建 release branch，cherry-pick dev 上的 public commits（跳過 chore(poc)）
# 不直接對 main 操作，而是建立 clean release branch → 開 PR → 等人工 review merge
on:
  workflow_dispatch:
    inputs:
      pr_title:
        description: 'PR Title'
        required: true
        type: string
      pr_body:
        description: 'PR Body (markdown)'
        required: true
        type: string

jobs:
  clean-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Suppress co-author trailer added by some git tools
          git config trailer.co-authored-by.ifexists doNothing

      - name: Fetch dev branch
        run: git fetch origin dev

      - name: Create release branch and cherry-pick public commits
        id: clean_branch
        run: |
          SHORT_SHA=$(git rev-parse --short origin/dev)
          CLEAN_BRANCH="release/clean-${SHORT_SHA}"
          echo "name=${CLEAN_BRANCH}" >> $GITHUB_OUTPUT

          # 若 release branch 已存在（前次 run 失敗殘留），直接重用，跳過建立與 push
          if git ls-remote --exit-code origin "${CLEAN_BRANCH}"; then
            echo "Branch ${CLEAN_BRANCH} already exists on remote, reusing"
            echo "cherry_picked=reused" >> $GITHUB_OUTPUT
            exit 0
          fi

          git checkout -b "${CLEAN_BRANCH}"

          # 找出 dev 上還沒進 main 的 commits（依 patch 內容比對，非 SHA）
          # + 表示尚未進 main，- 表示已進 main
          NEW_COMMITS=$(git cherry origin/main origin/dev | grep '^+' | awk '{print $2}')

          if [ -z "$NEW_COMMITS" ]; then
            echo "No new commits to cherry-pick — nothing to merge"
            exit 1
          fi

          # 逐一檢查：跳過 chore(poc) commits，cherry-pick 其餘 public commits
          PICKED=""
          while IFS= read -r sha; do
            MSG=$(git log -1 --format="%s" "$sha")
            if echo "$MSG" | grep -qE '^chore\(poc\)'; then
              echo "Skipping dev-only commit: $sha — $MSG"
            else
              echo "Cherry-picking: $sha — $MSG"
              git cherry-pick "$sha"
              PICKED="${PICKED:+$PICKED, }$sha"
            fi
          done <<< "$NEW_COMMITS"

          if [ -z "$PICKED" ]; then
            echo "All new commits are dev-only (chore(poc)) — nothing to merge"
            exit 1
          fi

          echo "cherry_picked=${PICKED}" >> $GITHUB_OUTPUT
          git push origin "${CLEAN_BRANCH}"

      - name: Create PR to main
        id: create_pr
        run: |
          cat > /tmp/pr_body.md << 'PRBODY'
          ${{ inputs.pr_body }}
          PRBODY
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.clean_branch.outputs.name }}" \
            --title "${{ inputs.pr_title }}" \
            --body-file /tmp/pr_body.md)
          echo "url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "PR created: ${PR_URL}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (if repo allows)
        # 若 repo 已開啟「Allow auto-merge」且 branch protection 設定 required checks，
        # 會在所有 checks 通過後自動 merge。
        # 若 repo 未開啟此功能，此步驟會 fail-safe 跳過（不影響整體流程）。
        continue-on-error: true
        run: |
          gh pr merge --auto --merge "${{ steps.create_pr.outputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ Clean PR Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Clean Branch | \`${{ steps.clean_branch.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cherry-picked commits | ${{ steps.clean_branch.outputs.cherry_picked }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PR | ${{ steps.create_pr.outputs.url }} |" >> $GITHUB_STEP_SUMMARY

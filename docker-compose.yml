services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:80"
    networks:
      - app-network
    restart: on-failure
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/')"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 15s
    env_file:
      - path: .env
        required: true
    environment:
      WORKFLOW_ARTIFACTS_ROOT: /app/workflow_artifacts
      SLIDE_TEMPLATE_PATH: /app/assets/pptx-template.pptx
      MLFLOW_TRACKING_URI: http://mlflow:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./assets:/app/assets:ro
      - ./workflow_artifacts:/app/workflow_artifacts
      - ./mlruns:/app/mlruns:rw
      - ./mlartifacts:/app/mlartifacts:rw

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    networks:
      - app-network
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.0
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./mlruns:/mlruns:rw
      - ./mlartifacts:/mlartifacts:rw
    environment:
      MLFLOW_LOGGING_LEVEL: "WARNING"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 8080
      --backend-store-uri sqlite:////mlruns/mlruns.db
      --default-artifact-root /mlartifacts

networks:
  app-network:
